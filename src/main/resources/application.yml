spring:
  application:
    name: ai-issue-triage-system
  profiles:
    default: local

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://localhost:3306/ai_issue_triage?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ai_issue
    password: ai_issue
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  docker:
    compose:
      file: docker-compose.yml
      lifecycle-management: start_only
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ai-issue-triage
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.example.aiissuetriage.issue.infrastructure.kafka
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  data:
    redis:
      host: localhost
      port: 6379

issue:
  kafka:
    topic:
      issue-analysis-requested: issue-analysis-requested

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
